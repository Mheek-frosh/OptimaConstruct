<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var theme = localStorage.getItem('optima-theme');
        if (!theme) theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        var root = document.documentElement;
        if (theme === 'dark') root.classList.add('dark');
        else root.classList.remove('dark');
        root.setAttribute('data-theme', theme);
        root.style.colorScheme = theme;
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Optima Construct AI | AI Construction Planning Platform</title>
    <meta name="description" content="Optima Construct AI helps construction companies plan projects, estimate costs, and optimize workflows using artificial intelligence." />
    <meta name="keywords" content="Optima Construct AI, construction AI, building AI tools, construction automation, construction intelligence, delay prediction, cost forecasting, document intelligence" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.optimaconstructai.com" />
    <!-- Open Graph for social sharing -->
    <meta property="og:title" content="Optima Construct AI" />
    <meta property="og:description" content="AI-powered construction planning and optimization platform." />

    <!-- Twitter Card -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>

  </body>
</html>
